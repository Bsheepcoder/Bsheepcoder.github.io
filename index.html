<!DOCTYPE html>
<html>

<head>
    <meta charset="utf-8">
    <!-- 标题 -->
    <title>bsheepcoder</title>
    <!-- 样式 -->
    <!-- <link rel="stylesheet" type="text/css" href="mystyle.css"> -->
    <script type="text/javascript" src="showdown-master/dist/showdown.min.js"></script>
    <script type="text/javascript">

        function compile() {
            //        获取想要转换的文字
            var text = document.getElementById("content").value;

            //        创建实例
            var converter = new showdown.Converter();

            //        进行转换
            var html = converter.makeHtml(text);

            //        将内容显示到指定的地方
            document.getElementById("result").innerHTML = html;
        }


    </script>
    <style>
        .body {
            background-color: darkturquoise;
            font-size: 20px;
            text-align: center;
        }

        .center {
            text-align: center;
        }

        h1 {
            font-family: '微软雅黑';
        }

        p {
            font-family：'微软雅黑',
            Times,
            serif;
            font-size: 20px;
            /*字体大小*/
        }

        /*自定义代码显示效果*/
        code {
            color: #D34B62;
            background: #fdffbd;
        }

        #wrap {
            margin: auto;
            overflow: hidden;
           
        }

        #mark {
            width: 40%;
            height: 800px;
            float: left;
        }

        #result {
            width: 40%;
            height: 800px;
            float: left;
            background-color: #27bbff;
        }
    </style>
</head>

<body class="body">
    <h1>Bsheepcoder's blog</h1>
    <h2>写下自己的笔记</h2>
    <p class="center"></p>
    <form class="center">
        <!-- 日记： -->
        <textarea rows="20" cols="40">
    <!-- 这是文本域，这里可以写规定字数的文本 -->
    </textarea>
    </form>

    <div id="wrap" style="text-align: center">
        <div id="mark">
            <!--通过onkeyup方法实现实时显示-->
            <textarea id="content" onkeyup="compile()" style="width: 100%;height: 100%;"></textarea>
        </div>
        <div id="result"></div>
    </div>
</body>

</html>
